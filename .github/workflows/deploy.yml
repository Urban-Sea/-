name: Deploy Worker + Pages

on:
  push:
    branches: [main]
    paths:
      - 'app/worker/**'
      - 'app/frontend/**'

jobs:
  deploy-worker:
    name: Deploy Cloudflare Worker
    runs-on: ubuntu-latest
    if: contains(join(github.event.commits.*.modified, ','), 'app/worker/') || contains(join(github.event.commits.*.added, ','), 'app/worker/')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: app/worker
        run: npm ci

      - name: Deploy Worker
        working-directory: app/worker
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-pages:
    name: Deploy Cloudflare Pages
    runs-on: ubuntu-latest
    if: contains(join(github.event.commits.*.modified, ','), 'app/frontend/') || contains(join(github.event.commits.*.added, ','), 'app/frontend/')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: app/frontend
        run: npm ci

      - name: Build
        working-directory: app/frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://open-regime-api.ryu3ta-ke-mo100307.workers.dev

      - name: Deploy to Pages
        working-directory: app/frontend
        run: npx wrangler pages deploy out --project-name=open-regime --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
