name: Daily Batch

on:
  # schedule:
  #   # 7:30 JST = 22:30 UTC (前日)
  #   - cron: '30 22 * * *'
  # VPS 移行後は docker compose run --rm batch で cron 実行に切り替え
  workflow_dispatch: # 手動実行のみ

jobs:
  batch:
    name: Daily data fetch + precompute + cache warmup
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r app/backend/requirements.txt

      - name: Run daily batch
        run: python app/batch/run.py --daily --verbose
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT || '5432' }}
          DB_NAME: ${{ secrets.DB_NAME || 'open_regime' }}
          DB_USER: ${{ secrets.DB_USER || 'app' }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
