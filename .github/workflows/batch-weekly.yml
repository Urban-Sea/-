name: Weekly Batch

on:
  # schedule:
  #   # 毎週土曜 8:00 JST = 金曜 23:00 UTC
  #   # 金曜の米雇用統計（第1金曜）やFRBデータ更新後に実行
  #   - cron: '0 23 * * 5'
  # VPS 移行後は docker compose run --rm batch で cron 実行に切り替え
  workflow_dispatch: # 手動実行のみ

jobs:
  batch:
    name: Weekly data fetch + Layer recalculation + precompute
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r app/backend/requirements.txt

      - name: Run weekly batch
        run: python app/batch/run.py --weekly --verbose
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT || '5432' }}
          DB_NAME: ${{ secrets.DB_NAME || 'open_regime' }}
          DB_USER: ${{ secrets.DB_USER || 'app' }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
