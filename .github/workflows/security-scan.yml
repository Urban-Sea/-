# ----------------------------------------------------------------------------
# security-scan.yml
#
# 目的: 依存脆弱性 (Trivy) と SBOM (Syft) を継続的に可視化する。
# 出力:
#   - trivy-fs.sarif → GitHub Security タブ (Code Scanning)
#   - trivy-fs.json  → artifact (30 日保持) ※トリアージ用の生データ
#   - sbom.spdx.json → artifact (90 日保持) ※リリース間 diff の元データ
#
# 設計判断:
#   - 全 Action を commit SHA で pin (mutable tag の書き換え攻撃を遮断)
#   - permissions は read を default、SARIF upload のみ write 昇格
#   - schedule は 18:00 UTC = 03:00 JST 翌日 (低トラフィック帯)
#   - scan-type=fs のみ。image scan は GHCR pull 型 deploy 移行後に有効化予定
# ----------------------------------------------------------------------------

name: security-scan

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  trivy-fs:
    name: Trivy filesystem scan
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write  # SARIF upload
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Run Trivy (SARIF for Code Scanning)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: false

      - name: Upload SARIF to Code Scanning
        uses: github/codeql-action/upload-sarif@bc0b696b4103f5fe60f15749af68a046868d511a  # codeql-bundle-v2.25.4
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

      - name: Run Trivy (JSON for triage)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: json
          output: trivy-fs.json
          severity: HIGH,CRITICAL
          ignore-unfixed: false

      - name: Upload Trivy JSON artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: trivy-fs-json
          path: trivy-fs.json
          retention-days: 30
          if-no-files-found: error

  notify:
    name: Slack notification
    needs: [trivy-fs, trivy-image]
    runs-on: ubuntu-24.04
    if: always()
    timeout-minutes: 5
    steps:
      - name: Download all Trivy artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          pattern: trivy-*
          merge-multiple: true

      - name: Build and send Slack message
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL not set, skipping notification"
            exit 0
          fi

          # fs scan results
          FS_CRITICAL=0; FS_HIGH=0
          if [ -f trivy-fs.json ]; then
            FS_CRITICAL=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' trivy-fs.json 2>/dev/null || echo 0)
            FS_HIGH=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="HIGH")] | length' trivy-fs.json 2>/dev/null || echo 0)
          fi

          # image scan results
          IMG_LINES=""
          IMG_TOTAL_C=0; IMG_TOTAL_H=0
          for f in trivy-image-*.json; do
            [ -f "$f" ] || continue
            NAME=$(echo "$f" | sed 's/trivy-image-//;s/\.json//')
            C=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' "$f" 2>/dev/null || echo 0)
            H=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="HIGH")] | length' "$f" 2>/dev/null || echo 0)
            IMG_TOTAL_C=$((IMG_TOTAL_C + C))
            IMG_TOTAL_H=$((IMG_TOTAL_H + H))
            IMG_LINES="${IMG_LINES}  ${NAME}: C:${C} H:${H}\n"
          done

          TOTAL_C=$((FS_CRITICAL + IMG_TOTAL_C))
          TOTAL_H=$((FS_HIGH + IMG_TOTAL_H))
          TOTAL=$((TOTAL_C + TOTAL_H))

          if [ "$TOTAL" -eq 0 ]; then
            COLOR="#36a64f"
            STATUS="No HIGH/CRITICAL vulnerabilities found"
          else
            COLOR="#ff0000"
            STATUS="${TOTAL_C} CRITICAL, ${TOTAL_H} HIGH vulnerabilities detected"
          fi

          DETAIL="*FS scan:* C:${FS_CRITICAL} H:${FS_HIGH}"
          if [ -n "$IMG_LINES" ]; then
            DETAIL="${DETAIL}\n*Image scan:*\n${IMG_LINES}"
          fi

          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          SECURITY_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/security/code-scanning"

          PAYLOAD=$(jq -n \
            --arg color "$COLOR" \
            --arg status "$STATUS" \
            --arg detail "$DETAIL" \
            --arg run_url "$RUN_URL" \
            --arg security_url "$SECURITY_URL" \
            '{
              attachments: [{
                color: $color,
                blocks: [
                  {
                    type: "section",
                    text: {
                      type: "mrkdwn",
                      text: ("*Security Scan Report*\n" + $status + "\n\n" + $detail)
                    }
                  },
                  {
                    type: "actions",
                    elements: [
                      {
                        type: "button",
                        text: { type: "plain_text", text: "Workflow Run" },
                        url: $run_url
                      },
                      {
                        type: "button",
                        text: { type: "plain_text", text: "Code Scanning Alerts" },
                        url: $security_url
                      }
                    ]
                  }
                ]
              }]
            }')

          curl -sf -X POST -H 'Content-Type: application/json' \
            -d "$PAYLOAD" "$SLACK_WEBHOOK_URL" || true

  syft-sbom:
    name: Syft SBOM (SPDX)
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Generate SBOM (SPDX JSON)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610  # v0.24.0
        with:
          path: .
          format: spdx-json
          output-file: sbom.spdx.json
          upload-artifact: false

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: sbom-spdx
          path: sbom.spdx.json
          retention-days: 90
          if-no-files-found: error

  trivy-image:
    name: Trivy image scan (${{ matrix.image }})
    runs-on: ubuntu-24.04
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: open-regime-frontend
            context: ./app/frontend
            dockerfile: ./app/frontend/Dockerfile
          - image: open-regime-admin
            context: ./app/admin-frontend
            dockerfile: ./app/admin-frontend/Dockerfile
          - image: open-regime-api-python
            context: ./app/backend
            dockerfile: ./app/backend/Dockerfile
          - image: open-regime-api-go
            context: ./api-go
            dockerfile: ./api-go/Dockerfile
          - image: open-regime-batch
            context: .
            dockerfile: ./app/batch/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Build image
        run: docker build -t ${{ matrix.image }}:scan -f ${{ matrix.dockerfile }} ${{ matrix.context }}

      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          scan-type: image
          image-ref: ${{ matrix.image }}:scan
          format: json
          output: trivy-image-${{ matrix.image }}.json
          severity: HIGH,CRITICAL
          ignore-unfixed: false

      - name: Print summary
        run: |
          CRITICAL=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' trivy-image-${{ matrix.image }}.json 2>/dev/null || echo 0)
          HIGH=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="HIGH")] | length' trivy-image-${{ matrix.image }}.json 2>/dev/null || echo 0)
          echo "### ${{ matrix.image }}: ${CRITICAL} CRITICAL, ${HIGH} HIGH" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload scan result
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: trivy-image-${{ matrix.image }}
          path: trivy-image-${{ matrix.image }}.json
          retention-days: 30
          if-no-files-found: error

# ----------------------------------------------------------------------------
# 将来対応:
#   - Cosign / SLSA provenance: GHCR 移行と併せて。
# ----------------------------------------------------------------------------
